version: 2
updates:
  - package-ecosystem: 'cargo'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps):'
    open-pull-requests-limit: 10
    groups:
      cargo-minor-and-patch:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
      cargo-security:
        applies-to: 'security-updates'
        patterns:
          - '*'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps):'
    open-pull-requests-limit: 10
    groups:
      actions-minor-and-patch:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
      actions-security:
        applies-to: 'security-updates'
        patterns:
          - '*'

  - package-ecosystem: 'docker'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore(deps):'
    open-pull-requests-limit: 5
    groups:
      docker-minor-and-patch:
        applies-to: 'version-updates'
        update-types:
          - 'minor'
          - 'patch'
      docker-security:
        applies-to: 'security-updates'
        patterns:
          - '*'
