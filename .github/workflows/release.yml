name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write

defaults:
  run:
    working-directory: ./

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-package:
    runs-on: ubuntu-latest

    steps:
      - name: Runner Common Setup
        uses: mridang/action-runner-common@v1

      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'

      # peepee is a Rust crate: the semantic-release-cargo plugin runs
      # `cargo set-version` on the runner during its prepare step, so cargo
      # must be present. The image itself is built inside the Dockerfile via
      # cargo-zigbuild, which carries its own toolchain (no cross target or
      # musl linker needed here, and no QEMU — zigbuild cross-compiles).
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Multi-platform `docker buildx build` (run internally by
      # @mridang/semantic-release-oci) needs a container-driver builder; the
      # default docker driver cannot emit a multi-arch manifest.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run semantic-release
        uses: mridang/action-semantic-release@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
        env:
          # @mridang/semantic-release-oci performs `docker login` itself using
          # these; no separate docker/login-action step is needed.
          DOCKER_REGISTRY_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_REGISTRY_PASSWORD: ${{ secrets.DOCKERHUB_TOKEN }}
          # semantic-release-cargo's verifyConditions requires this token. With
          # the crate `publish = false` it is verified but not used.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
